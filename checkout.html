<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Forseti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        .checkout-page {
            min-height: 100vh;
            padding: calc(var(--header-height) + var(--space-12)) var(--space-4) var(--space-12);
        }
        .checkout-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: var(--space-8);
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }
        .checkout-card {
            padding: var(--space-8);
            animation: fadeInUp 0.5s ease-out;
        }
        .checkout-card h2 {
            font-size: var(--text-xl);
            color: var(--purple-900);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .checkout-card h2 i {
            color: var(--purple-500);
        }
        .checkout-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }
        .checkout-form-grid .fms-form-group:nth-child(1),
        .checkout-form-grid .fms-form-group:nth-child(2),
        .checkout-form-grid .fms-form-group:nth-child(5),
        .checkout-form-grid .fms-form-group:nth-child(6) {
            grid-column: span 2;
        }
        .card-icons {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
        }
        .card-icons i {
            font-size: var(--text-2xl);
        }
        .summary-card {
            padding: var(--space-8);
            position: sticky;
            top: calc(var(--header-height) + var(--space-4));
            animation: fadeInUp 0.5s ease-out 0.1s both;
        }
        .summary-card h3 {
            font-size: var(--text-lg);
            color: var(--purple-900);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .summary-badge {
            background: var(--purple-100);
            color: var(--purple-700);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--slate-100);
            font-size: var(--text-sm);
            color: var(--slate-600);
        }
        .summary-row:last-child {
            border-bottom: none;
            font-weight: 700;
            color: var(--purple-900);
            font-size: var(--text-lg);
            padding-top: var(--space-4);
            margin-top: var(--space-2);
            border-top: 2px solid var(--purple-100);
        }
        .summary-row a {
            color: var(--purple-600);
            transition: color var(--transition-base);
        }
        .summary-row a:hover {
            color: var(--purple-800);
        }
        .checkout-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            margin-top: var(--space-6);
        }
        .checkout-actions .fms-btn {
            width: 100%;
            justify-content: center;
        }
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
            .summary-card {
                position: static;
            }
            .checkout-form-grid {
                grid-template-columns: 1fr;
            }
            .checkout-form-grid .fms-form-group:nth-child(1),
            .checkout-form-grid .fms-form-group:nth-child(2),
            .checkout-form-grid .fms-form-group:nth-child(5),
            .checkout-form-grid .fms-form-group:nth-child(6) {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body class="fms-page">

    <nav class="fms-nav scrolled">
        <div class="fms-nav-inner">
            <a href="index.html" class="fms-logo">
                <i class="fas fa-balance-scale" style="font-size: 1.5rem; color: var(--purple-600);"></i>
                Forseti
            </a>
            <div class="fms-nav-links">
                <a href="index.html" class="fms-nav-link">Home</a>
                <a href="application-form.html" class="fms-nav-link">Apply</a>
                <a href="contact.html" class="fms-nav-link">Contact</a>
                <button class="fms-theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
                  <i class="fas fa-sun"></i>
                  <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="checkout-page">
        <div class="fms-container">
            <div class="checkout-grid">
                <div class="glass checkout-card">
                    <form action="/action_page.php">
                        <h2><i class="fas fa-address-card"></i> Billing Address</h2>
                        <div class="checkout-form-grid fms-form">
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-user"></i> Full Name</label>
                                <input type="text" id="fname" name="firstname" class="fms-input" placeholder="Enter your full name">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" id="email" name="email" class="fms-input" placeholder="Enter your email">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-map-marker-alt"></i> Address</label>
                                <input type="text" id="adr" name="address" class="fms-input" placeholder="Enter your address">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-city"></i> City</label>
                                <input type="text" id="city" name="city" class="fms-input" placeholder="Enter your city">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-mail-bulk"></i> ZIP Code</label>
                                <input type="text" id="zip" name="zip" class="fms-input" placeholder="Enter ZIP code">
                            </div>
                        </div>

                        <h2 style="margin-top: var(--space-8);"><i class="fas fa-credit-card"></i> Payment Details</h2>
                        <div class="card-icons">
                            <i class="fab fa-cc-visa" style="color: #1a1f71;"></i>
                            <i class="fab fa-cc-amex" style="color: #006fcf;"></i>
                            <i class="fab fa-cc-mastercard" style="color: #eb001b;"></i>
                            <i class="fab fa-cc-discover" style="color: #ff6000;"></i>
                        </div>
                        <div class="checkout-form-grid fms-form">
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-signature"></i> Name on Card</label>
                                <input type="text" id="cname" name="cardname" class="fms-input" placeholder="Name as shown on card">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-credit-card"></i> Card Number</label>
                                <input type="text" id="ccnum" name="cardnumber" class="fms-input" placeholder="1111-2222-3333-4444">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-calendar-alt"></i> Expiry Month</label>
                                <input type="text" id="expmonth" name="expmonth" class="fms-input" placeholder="e.g. May">
                            </div>
                            <div class="fms-form-group">
                                <label class="fms-label"><i class="fas fa-calendar"></i> Expiry Year</label>
                                <input type="text" id="expyear" name="expyear" class="fms-input" placeholder="e.g. 2025">
                            </div>
                        </div>
                        <label class="fms-checkbox" style="margin-top: var(--space-4);">
                            <input type="checkbox" checked name="sameadr"> Shipping address same as billing
                        </label>
                    </form>
                </div>

                <div class="glass-strong summary-card">
                    <h3>Service Charges <span class="summary-badge">2 Items</span></h3>
                    <div class="summary-row">
                        <span>Lawyer's Cost</span>
                        <span>40,000 BDT</span>
                    </div>
                    <div class="summary-row">
                        <span>Service Charge</span>
                        <span>5,000 BDT</span>
                    </div>
                    <div class="summary-row">
                        <span>Total</span>
                        <span>45,000 BDT</span>
                    </div>
                    <div class="checkout-actions">
                        <a href="application-form.html" class="fms-btn fms-btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to Application
                        </a>
                        <a href="success.html" class="fms-btn fms-btn-primary fms-btn-lg">
                            <i class="fas fa-lock"></i> Complete Payment
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
