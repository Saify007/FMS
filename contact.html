<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Forseti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        .contact-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--header-height) + var(--space-8)) var(--space-4) var(--space-8);
            background: linear-gradient(135deg, var(--purple-700) 0%, var(--purple-800) 50%, var(--purple-900) 100%);
            position: relative;
            overflow: hidden;
        }
        .contact-page::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        .contact-card {
            width: 100%;
            max-width: 560px;
            padding: var(--space-10);
            animation: scaleIn 0.5s ease-out;
            position: relative;
            z-index: 1;
        }
        .contact-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        .contact-header .contact-icon {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-600) 100%);
            color: var(--white);
            border-radius: var(--radius-lg);
            font-size: var(--text-3xl);
            margin: 0 auto var(--space-4);
            box-shadow: var(--shadow-purple);
        }
        .contact-header h1 {
            font-size: var(--text-2xl);
            color: var(--purple-900);
            margin-bottom: var(--space-2);
        }
        .contact-header p {
            font-size: var(--text-sm);
            color: var(--slate-500);
        }
        .form-actions {
            display: flex;
            gap: var(--space-3);
        }
        .form-actions .fms-btn {
            flex: 1;
        }
        @media (max-width: 480px) {
            .contact-card {
                padding: var(--space-6);
            }
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="fms-theme-toggle-fixed" onclick="window.forsetiTheme.toggle()" aria-label="Toggle dark mode" title="Toggle theme">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon"></i>
    </button>

    <main class="contact-page">
        <div class="glass-strong contact-card">
            <div class="contact-header">
                <div class="contact-icon">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h1>Contact Us</h1>
                <p>Please fill in this form and send us your message. We will respond as soon as possible.</p>
            </div>

            <form action="contact.php" method="post" class="fms-form">
                <div class="fms-form-group">
                    <label class="fms-label" for="inputName"><i class="fas fa-user"></i> Name <sup style="color: var(--error);">*</sup></label>
                    <input type="text" name="name" id="inputName" class="fms-input" placeholder="Enter your name">
                </div>
                <div class="fms-form-group">
                    <label class="fms-label" for="inputEmail"><i class="fas fa-envelope"></i> Email <sup style="color: var(--error);">*</sup></label>
                    <input type="email" name="email" id="inputEmail" class="fms-input" placeholder="Enter your email">
                </div>
                <div class="fms-form-group">
                    <label class="fms-label" for="inputSubject"><i class="fas fa-tag"></i> Subject</label>
                    <input type="text" name="subject" id="inputSubject" class="fms-input" placeholder="Enter subject">
                </div>
                <div class="fms-form-group">
                    <label class="fms-label" for="inputComment"><i class="fas fa-comment"></i> Message <sup style="color: var(--error);">*</sup></label>
                    <textarea name="message" id="inputComment" class="fms-textarea" placeholder="Write your message here..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="fms-btn fms-btn-primary fms-btn-lg">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                    <button type="reset" class="fms-btn fms-btn-secondary fms-btn-lg">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
