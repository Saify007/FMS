<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage Demo | Forseti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        .demo-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--header-height) + var(--space-8)) var(--space-4) var(--space-8);
            background: linear-gradient(135deg, var(--purple-700) 0%, var(--purple-800) 50%, var(--purple-900) 100%);
            position: relative;
            overflow: hidden;
        }
        .demo-page::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        .demo-card {
            width: 100%;
            max-width: 480px;
            padding: var(--space-10);
            animation: scaleIn 0.5s ease-out;
            position: relative;
            z-index: 1;
        }
        .demo-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        .demo-header .demo-icon {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-600) 100%);
            color: var(--white);
            border-radius: var(--radius-lg);
            font-size: var(--text-3xl);
            margin: 0 auto var(--space-4);
            box-shadow: var(--shadow-purple);
        }
        .demo-header h1 {
            font-size: var(--text-2xl);
            color: var(--purple-900);
            margin-bottom: var(--space-2);
        }
        .demo-header p {
            font-size: var(--text-sm);
            color: var(--slate-500);
        }
        .demo-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-6);
        }
        .demo-actions .fms-btn {
            flex: 1;
        }
        @media (max-width: 480px) {
            .demo-card {
                padding: var(--space-6);
            }
            .demo-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="fms-theme-toggle-fixed" onclick="window.forsetiTheme.toggle()" aria-label="Toggle dark mode" title="Toggle theme">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon"></i>
    </button>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script>
        if(localStorage) {
            $(document).ready(function() {
                $(".save").click(function() {
                    var firstName = $("#firstName").val();
                    localStorage.setItem("first_name", firstName);
                    alert("Your first name is saved.");
                });
                $(".access").click(function() {
                    var storedName = localStorage.getItem("first_name");
                    if(storedName) {
                        alert("Hi, " + storedName);
                    } else {
                        alert("No name saved yet.");
                    }
                });
            });
        } else {
            alert("Sorry, your browser does not support local storage.");
        }
    </script>

    <main class="demo-page">
        <div class="glass-strong demo-card">
            <div class="demo-header">
                <div class="demo-icon">
                    <i class="fas fa-database"></i>
                </div>
                <h1>Local Storage Demo</h1>
                <p>A simple demonstration of HTML5 Local Storage API.</p>
            </div>

            <form class="fms-form">
                <div class="fms-form-group">
                    <label class="fms-label"><i class="fas fa-user"></i> First Name</label>
                    <input type="text" id="firstName" class="fms-input" placeholder="Enter your first name">
                </div>
                <div class="demo-actions">
                    <button type="button" class="fms-btn fms-btn-primary save">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button type="button" class="fms-btn fms-btn-secondary access">
                        <i class="fas fa-eye"></i> Retrieve
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
